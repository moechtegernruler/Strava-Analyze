<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strava Analyse</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07090e;
    --surface: #0d1117;
    --border: #1a2030;
    --orange: #FC4C02;
    --orange-dim: rgba(252,76,2,0.12);
    --blue: #60a5fa;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a0d14, #0f1520);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 20px;
  }
  .header-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text);
  }
  .header-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }

  /* CONNECT BUTTON */
  .connect-wrap { text-align: center; padding: 60px 20px; }
  .connect-btn {
    display: inline-flex; align-items: center; gap: 12px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-size: 14px;
    font-family: var(--font-mono);
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .connect-btn:hover { opacity: 0.85; }
  .connect-desc { font-size: 11px; color: var(--muted); margin-top: 16px; }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    padding: 18px 16px;
  }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }

  /* ACTIVITY LIST */
  .section-title {
    font-size: 10px; color: var(--muted); letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 12px;
  }

  .activity-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .activity-card:hover { border-color: var(--orange); }
  .activity-card.expanded { border-color: var(--orange); }

  .activity-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 8px;
  }
  .activity-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .activity-date { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .activity-type-badge {
    font-size: 9px; letter-spacing: 1.5px; padding: 3px 8px;
    border-radius: 4px; border: 1px solid; text-transform: uppercase;
  }

  .activity-metrics {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 12px; margin-top: 14px;
  }
  .metric { }
  .metric-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  .metric-value { font-size: 15px; font-weight: 700; }

  .activity-detail {
    display: none; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .activity-card.expanded .activity-detail { display: block; }

  /* ANALYSIS BOX */
  .analysis-box {
    background: #0a0d15;
    border-radius: 8px;
    padding: 16px;
    font-size: 11px;
    line-height: 1.8;
    color: #aaa;
    margin-top: 12px;
    border-left: 3px solid var(--orange);
  }
  .analysis-box .analysis-title {
    font-size: 10px; color: var(--orange); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 8px; font-weight: 700;
  }

  /* ZONE BARS */
  .zone-bars { margin-top: 12px; }
  .zone-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .zone-label { font-size: 9px; color: var(--muted); width: 30px; }
  .zone-bar-bg { flex: 1; background: var(--border); border-radius: 3px; height: 6px; }
  .zone-bar { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .zone-pct { font-size: 9px; color: var(--muted); width: 35px; text-align: right; }

  /* LOADING */
  .loading {
    text-align: center; padding: 40px;
    font-size: 12px; color: var(--muted);
  }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px; padding: 16px;
    font-size: 11px; color: var(--red);
    margin-bottom: 16px;
  }

  .logout-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 14px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 10px; cursor: pointer;
    letter-spacing: 1px; margin-left: 12px;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  .refresh-btn {
    background: var(--orange-dim); border: 1px solid var(--orange);
    color: var(--orange); padding: 6px 14px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 10px; cursor: pointer;
    letter-spacing: 1px;
  }
  .refresh-btn:hover { background: rgba(252,76,2,0.2); }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .activity-metrics { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Strava · Aktivitätsanalyse</div>
  <h1>Training<span style="color:var(--orange)">Analyse</span></h1>
  <div class="header-sub" id="header-sub">FTP 313 W · 72 kg · 35 J</div>
</div>

<div class="container" id="app">
  <div class="loading"><div class="spinner"></div><br>Laden...</div>
</div>

<script>
const CLIENT_ID = '256690';
const CLIENT_SECRET = '78bf0599bc053041e3b997dfa49dd18232bc6fc6';
const REDIRECT_URI = 'https://moechtegernruler.github.io/strava-analyse/';
const FTP = 313;
const WEIGHT = 72;
const HRMAX = 191;

// ── AUTH ──────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('strava_token'); }
function getRefreshToken() { return localStorage.getItem('strava_refresh'); }
function getExpiry() { return parseInt(localStorage.getItem('strava_expiry') || '0'); }

function saveTokens(access, refresh, expiry) {
  localStorage.setItem('strava_token', access);
  localStorage.setItem('strava_refresh', refresh);
  localStorage.setItem('strava_expiry', expiry);
}

function clearTokens() {
  localStorage.removeItem('strava_token');
  localStorage.removeItem('strava_refresh');
  localStorage.removeItem('strava_expiry');
}

async function refreshAccessToken() {
  const res = await fetch('https://www.strava.com/oauth/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      client_id: CLIENT_ID,
      client_secret: CLIENT_SECRET,
      grant_type: 'refresh_token',
      refresh_token: getRefreshToken()
    })
  });
  const data = await res.json();
  if (data.access_token) {
    saveTokens(data.access_token, data.refresh_token, data.expires_at);
    return data.access_token;
  }
  throw new Error('Token refresh fehlgeschlagen');
}

async function getValidToken() {
  if (Date.now() / 1000 > getExpiry() - 60) {
    return await refreshAccessToken();
  }
  return getToken();
}

// ── STRAVA API ────────────────────────────────────────────────────────
async function fetchActivities(perPage = 20) {
  const token = await getValidToken();
  const res = await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=${perPage}`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  return await res.json();
}

async function fetchActivity(id) {
  const token = await getValidToken();
  const res = await fetch(`https://www.strava.com/api/v3/activities/${id}`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  return await res.json();
}

async function fetchAthlete() {
  const token = await getValidToken();
  const res = await fetch('https://www.strava.com/api/v3/athlete', {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  return await res.json();
}

// ── CALCULATIONS ──────────────────────────────────────────────────────
function calcTSS(movingTimeSec, np, ftp) {
  if (!np || !ftp) return 0;
  const IF = np / ftp;
  return (movingTimeSec * np * IF) / (ftp * 3600) * 100;
}

function calcIF(np, ftp) {
  return np && ftp ? np / ftp : 0;
}

function hrZone(hr, hrmax) {
  const pct = hr / hrmax * 100;
  if (pct < 60) return 1;
  if (pct < 72) return 2;
  if (pct < 82) return 3;
  if (pct < 90) return 4;
  if (pct < 95) return 5;
  return 6;
}

function getActivityType(act) {
  const np = act.weighted_average_watts;
  const avg = act.average_watts;
  const time = act.moving_time;
  const IF = calcIF(np, FTP);

  if (time < 3600 && IF > 0.85) return { label: 'Intervalle', color: '#f97316' };
  if (time < 3600 && IF < 0.60) return { label: 'Regeneration', color: '#4ade80' };
  if (IF > 0.75) return { label: 'Schwelle', color: '#facc15' };
  return { label: 'Grundlage', color: '#60a5fa' };
}

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}h ${m.toString().padStart(2,'0')}m` : `${m}m`;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' });
}

// ── AI ANALYSIS ───────────────────────────────────────────────────────
async function getAIAnalysis(act) {
  const np = act.weighted_average_watts || 0;
  const avg = act.average_watts || 0;
  const IF = calcIF(np, FTP).toFixed(2);
  const TSS = calcTSS(act.moving_time, np, FTP).toFixed(0);
  const VI = avg > 0 ? (np / avg).toFixed(3) : '-';
  const dist = (act.distance / 1000).toFixed(1);
  const time = formatTime(act.moving_time);
  const hrAvg = act.average_heartrate || 0;
  const hrMax = act.max_heartrate || 0;
  const type = getActivityType(act);

  const prompt = `Du bist ein erfahrener Radsport-Coach. Analysiere diese Trainingseinheit kurz und präzise (3-4 Sätze auf Deutsch):

Fahrer: 35J, 72kg, FTP ${FTP}W, HRmax 191bpm, 2.5 Jahre Training
Einheit: ${act.name} — ${formatDate(act.start_date_local)}
Distanz: ${dist}km, Zeit: ${time}
Ø Power: ${avg}W, NP: ${np}W, IF: ${IF}, TSS: ${TSS}
VI: ${VI}
Ø HR: ${hrAvg}bpm, Max HR: ${hrMax}bpm
Einheitstyp: ${type.label}

Gib eine kurze, direkte Einschätzung der Einheit und einen konkreten Tipp. Keine Floskeln.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || 'Analyse nicht verfügbar.';
  } catch(e) {
    return 'Analyse nicht verfügbar.';
  }
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderZoneBars(hrAvg) {
  if (!hrAvg) return '';
  const zone = hrZone(hrAvg, HRMAX);
  const zoneColors = ['#4ade80','#a3e635','#facc15','#f97316','#ef4444','#dc2626'];
  const zoneLabels = ['Z1','Z2','Z3','Z4','Z5','Z6'];
  const pct = (hrAvg / HRMAX * 100).toFixed(0);

  return `
    <div style="margin-top:12px;">
      <div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">HR-Zone</div>
      <div style="display:flex;gap:4px;align-items:flex-end;height:32px;">
        ${zoneColors.map((c,i) => `
          <div style="flex:1;background:${i===zone-1?c:c+'33'};border-radius:3px;height:${i===zone-1?'100%':((i+1)*14)+'%'};transition:all 0.3s;"></div>
        `).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        ${zoneLabels.map((l,i) => `<div style="font-size:9px;color:${i===zone-1?zoneColors[i]:'var(--muted)'};flex:1;text-align:center;">${l}</div>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:6px;">Ø ${hrAvg} bpm = ${pct}% HRmax → <span style="color:${zoneColors[zone-1]}">Zone ${zone}</span></div>
    </div>`;
}

function renderActivity(act, index) {
  const np = act.weighted_average_watts || 0;
  const avg = act.average_watts || 0;
  const IF = calcIF(np, FTP);
  const TSS = calcTSS(act.moving_time, np, FTP);
  const VI = avg > 0 ? (np / avg).toFixed(3) : '-';
  const dist = (act.distance / 1000).toFixed(1);
  const type = getActivityType(act);
  const wkg = avg > 0 ? (avg / WEIGHT).toFixed(2) : '-';

  const IFcolor = IF > 0.95 ? '#ef4444' : IF > 0.85 ? '#f97316' : IF > 0.75 ? '#facc15' : '#60a5fa';

  return `
    <div class="activity-card" id="act-${act.id}" onclick="toggleActivity('${act.id}', ${JSON.stringify(act).replace(/"/g,'&quot;')})">
      <div class="activity-header">
        <div>
          <div class="activity-name">${act.name}</div>
          <div class="activity-date">${formatDate(act.start_date_local)}</div>
        </div>
        <div class="activity-type-badge" style="color:${type.color};border-color:${type.color}44;background:${type.color}11;">
          ${type.label}
        </div>
      </div>

      <div class="activity-metrics">
        <div class="metric">
          <div class="metric-label">Distanz</div>
          <div class="metric-value" style="color:var(--text)">${dist} km</div>
        </div>
        <div class="metric">
          <div class="metric-label">Zeit</div>
          <div class="metric-value" style="color:var(--text)">${formatTime(act.moving_time)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">NP</div>
          <div class="metric-value" style="color:var(--orange)">${np > 0 ? np + ' W' : '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">IF</div>
          <div class="metric-value" style="color:${IFcolor}">${IF > 0 ? IF.toFixed(2) : '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">TSS</div>
          <div class="metric-value" style="color:var(--text)">${TSS > 0 ? Math.round(TSS) : '—'}</div>
        </div>
      </div>

      <div class="activity-detail" id="detail-${act.id}">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;">
          <div class="metric">
            <div class="metric-label">Ø Power</div>
            <div class="metric-value" style="color:var(--text);font-size:13px">${avg > 0 ? avg + ' W' : '—'}</div>
          </div>
          <div class="metric">
            <div class="metric-label">W/kg</div>
            <div class="metric-value" style="color:var(--text);font-size:13px">${wkg}</div>
          </div>
          <div class="metric">
            <div class="metric-label">VI</div>
            <div class="metric-value" style="color:var(--text);font-size:13px">${VI}</div>
          </div>
          <div class="metric">
            <div class="metric-label">% FTP</div>
            <div class="metric-value" style="color:${IFcolor};font-size:13px">${np > 0 ? Math.round(np/FTP*100) + '%' : '—'}</div>
          </div>
        </div>
        ${renderZoneBars(act.average_heartrate)}
        <div class="analysis-box" id="analysis-${act.id}">
          <div class="analysis-title">KI-Analyse</div>
          <div id="analysis-text-${act.id}"><span style="color:var(--muted)">Wird geladen...</span></div>
        </div>
      </div>
    </div>`;
}

const expandedActivities = new Set();
const analysisCache = {};

async function toggleActivity(id, act) {
  const card = document.getElementById(`act-${id}`);
  const detail = document.getElementById(`detail-${id}`);

  if (expandedActivities.has(id)) {
    expandedActivities.delete(id);
    card.classList.remove('expanded');
  } else {
    expandedActivities.add(id);
    card.classList.add('expanded');

    if (!analysisCache[id]) {
      const textEl = document.getElementById(`analysis-text-${id}`);
      try {
        const analysis = await getAIAnalysis(act);
        analysisCache[id] = analysis;
        textEl.textContent = analysis;
      } catch(e) {
        textEl.textContent = 'Analyse nicht verfügbar.';
      }
    } else {
      document.getElementById(`analysis-text-${id}`).textContent = analysisCache[id];
    }
  }
}

async function renderDashboard() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><div class="spinner"></div><br>Aktivitäten werden geladen...</div>';

  try {
    const [athlete, activities] = await Promise.all([fetchAthlete(), fetchActivities(15)]);

    if (!Array.isArray(activities)) throw new Error('Keine Aktivitäten');

    const rides = activities.filter(a => a.type === 'Ride' || a.type === 'VirtualRide' || a.sport_type === 'Ride');

    // Weekly TSS
    const now = new Date();
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay() + 1); weekStart.setHours(0,0,0,0);
    const weekRides = rides.filter(a => new Date(a.start_date) >= weekStart);
    const weekTSS = weekRides.reduce((s,a) => s + calcTSS(a.moving_time, a.weighted_average_watts||0, FTP), 0);
    const weekDist = weekRides.reduce((s,a) => s + a.distance/1000, 0);

    // Total this year
    const yearStart = new Date(now.getFullYear(), 0, 1);
    const yearRides = rides.filter(a => new Date(a.start_date) >= yearStart);
    const yearDist = yearRides.reduce((s,a) => s + a.distance/1000, 0);

    document.getElementById('header-sub').textContent =
      `${athlete.firstname} ${athlete.lastname} · FTP ${FTP}W · ${WEIGHT}kg`;

    app.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
        <div style="font-size:11px;color:var(--muted)">Letzte ${rides.length} Ausfahrten</div>
        <div>
          <button class="refresh-btn" onclick="renderDashboard()">↻ Aktualisieren</button>
          <button class="logout-btn" onclick="logout()">Abmelden</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">TSS diese Woche</div>
          <div class="stat-value" style="color:var(--orange)">${Math.round(weekTSS)}</div>
          <div class="stat-sub">${weekRides.length} Einheiten</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">km diese Woche</div>
          <div class="stat-value">${Math.round(weekDist)}</div>
          <div class="stat-sub">seit Montag</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">FTP Referenz</div>
          <div class="stat-value" style="color:var(--orange)">${FTP} W</div>
          <div class="stat-sub">${(FTP/WEIGHT).toFixed(2)} W/kg</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">km dieses Jahr</div>
          <div class="stat-value">${Math.round(yearDist)}</div>
          <div class="stat-sub">${yearRides.length} Ausfahrten</div>
        </div>
      </div>

      <div class="section-title">Letzte Ausfahrten — Tippen für KI-Analyse</div>
      ${rides.map((a,i) => renderActivity(a, i)).join('')}
    `;

  } catch(e) {
    app.innerHTML = `<div class="error-box">Fehler: ${e.message}</div>
      <button class="connect-btn" onclick="logout()" style="margin:0 auto;display:block;">Neu verbinden</button>`;
  }
}

function logout() {
  clearTokens();
  window.location.hash = '';
  init();
}

// ── OAUTH FLOW ────────────────────────────────────────────────────────
async function handleCallback(code) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><div class="spinner"></div><br>Verbinde mit Strava...</div>';

  try {
    const res = await fetch('https://www.strava.com/oauth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        client_id: CLIENT_ID,
        client_secret: CLIENT_SECRET,
        code: code,
        grant_type: 'authorization_code'
      })
    });
    const data = await res.json();
    if (data.access_token) {
      saveTokens(data.access_token, data.refresh_token, data.expires_at);
      window.history.replaceState({}, '', window.location.pathname);
      await renderDashboard();
    } else {
      throw new Error(data.message || 'Auth fehlgeschlagen');
    }
  } catch(e) {
    app.innerHTML = `<div class="error-box">Auth-Fehler: ${e.message}</div>`;
  }
}

function renderConnect() {
  const app = document.getElementById('app');
  const authUrl = `https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=activity:read_all`;

  app.innerHTML = `
    <div class="connect-wrap">
      <div style="font-size:11px;color:var(--muted);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;">Schritt 1 von 1</div>
      <a href="${authUrl}" class="connect-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
        Mit Strava verbinden
      </a>
      <div class="connect-desc">Einmaliger Login · Nur Lesezugriff auf Aktivitäten</div>
    </div>`;
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code) {
    await handleCallback(code);
  } else if (getToken()) {
    await renderDashboard();
  } else {
    renderConnect();
  }
}

init();
</script>
</body>
</html>
