<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7; --surface: #ffffff; --surface2: #f0f0f2;
  --border: #e2e2e6; --orange: #FC4C02; --orange-light: rgba(252,76,2,0.08);
  --blue: #2563eb; --green: #16a34a; --yellow: #d97706; --red: #dc2626;
  --text: #111827; --muted: #6b7280;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
.header { background: white; border-bottom: 1px solid var(--border); padding: 18px 20px; position: sticky; top: 0; z-index: 10; }
.header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-title { font-size: 18px; font-weight: 700; }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.header-actions { display: flex; gap: 8px; }
.btn-primary { background: var(--orange); color: white; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-family: var(--font); font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: opacity 0.15s; }
.btn-primary:hover { opacity: 0.85; }
.btn-small { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 12px; font-family: var(--font); cursor: pointer; }
.container { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

/* MORNING */
.morning-card { background: white; border: 1px solid var(--border); border-left: 4px solid var(--orange); border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; }
.morning-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
.morning-inputs { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
.morning-field label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
.morning-field input { width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; font-family: var(--mono); font-weight: 700; color: var(--text); background: var(--surface2); outline: none; }
.morning-field input:focus { border-color: var(--orange); background: white; }
.readiness-bar { margin-top: 14px; }
.readiness-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.readiness-track { background: var(--surface2); border-radius: 6px; height: 8px; overflow: hidden; }
.readiness-fill { height: 100%; border-radius: 6px; transition: width 0.4s, background 0.4s; background: #9ca3af; width: 0; }
.readiness-text { font-size: 12px; font-weight: 600; margin-top: 6px; color: var(--muted); }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.stat-value { font-size: 22px; font-weight: 700; font-family: var(--mono); }
.stat-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.section-title { font-size: 13px; font-weight: 700; }

/* ACTIVITY */
.activity-card { background: white; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; transition: box-shadow 0.15s; }
.activity-card.expanded { border-color: var(--orange); box-shadow: 0 2px 16px rgba(252,76,2,0.1); }
.activity-header { padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.activity-name { font-size: 14px; font-weight: 700; }
.activity-meta { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
.activity-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.activity-quick { display: grid; grid-template-columns: repeat(5,1fr); border-top: 1px solid var(--border); cursor: pointer; }
.quick-metric { padding: 10px 12px; border-right: 1px solid var(--border); }
.quick-metric:last-child { border-right: none; }
.quick-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.quick-value { font-size: 15px; font-weight: 700; font-family: var(--mono); }
.activity-body { padding: 16px; border-top: 1px solid var(--border); display: none; }
.activity-card.expanded .activity-body { display: block; }

/* ANALYSIS */
.analysis-box { background: var(--surface2); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
.analysis-box h4 { font-size: 10px; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.insight-row { display: flex; gap: 8px; margin-bottom: 7px; font-size: 12px; line-height: 1.6; }
.insight-icon { width: 18px; flex-shrink: 0; }

/* METRICS */
.metrics-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
.metric-box { background: var(--surface2); border-radius: 8px; padding: 12px; }
.metric-box-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.metric-box-value { font-size: 18px; font-weight: 700; font-family: var(--mono); }
.metric-box-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* LAPS */
.laps-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.laps-table th { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 600; }
.laps-table td { padding: 8px 8px; border-bottom: 1px solid var(--surface2); font-family: var(--mono); }
.laps-table tr:last-child td { border-bottom: none; }
.laps-table tr:hover td { background: var(--surface2); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }

/* MISC */
.loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.connect-wrap { text-align: center; padding: 80px 20px; }
.connect-wrap p { color: var(--muted); font-size: 12px; margin-top: 12px; }
.error-msg { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; color: var(--red); font-size: 12px; margin-bottom: 12px; }

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .morning-inputs { grid-template-columns: repeat(2,1fr); }
  .activity-quick { grid-template-columns: repeat(3,1fr); }
  .metrics-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="header-brand">
      <span style="font-size:22px">🚴</span>
      <div>
        <div class="header-title">Training Dashboard</div>
        <div class="header-sub" id="athlete-name">FTP 313 W · 72 kg · 35 J</div>
      </div>
    </div>
    <div class="header-actions" id="header-actions"></div>
  </div>
</div>

<div class="container" id="app">
  <div class="loading"><div class="spinner"></div>Laden...</div>
</div>

<script>
const CLIENT_ID = '256690';
const CLIENT_SECRET = '78bf0599bc053041e3b997dfa49dd18232bc6fc6';
const REDIRECT_URI = 'https://moechtegernruler.github.io/Strava-Analyze/';
const FTP = 313, WEIGHT = 72, HRMAX = 191, HR_BASE = 48, HRV_BASE = 67;
const ZONE_COLORS = ['#4ade80','#86efac','#facc15','#f97316','#ef4444','#dc2626'];

const S = {
  get: k => localStorage.getItem(k),
  set: (k,v) => localStorage.setItem(k,v),
  del: k => localStorage.removeItem(k),
  getJ: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  setJ: (k,v) => localStorage.setItem(k, JSON.stringify(v))
};

function saveTokens(a,r,e) { S.set('sa',a); S.set('sr',r); S.set('se',e); }
function clearTokens() { ['sa','sr','se'].forEach(k=>S.del(k)); }

async function getToken() {
  if (Date.now()/1000 > parseInt(S.get('se')||0)-60) {
    const r = await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:CLIENT_ID,client_secret:CLIENT_SECRET,grant_type:'refresh_token',refresh_token:S.get('sr')})});
    const d = await r.json();
    if (d.access_token) { saveTokens(d.access_token,d.refresh_token,d.expires_at); return d.access_token; }
    throw new Error('Token abgelaufen');
  }
  return S.get('sa');
}

async function api(path) {
  const t = await getToken();
  const r = await fetch(`https://www.strava.com/api/v3${path}`,{headers:{'Authorization':`Bearer ${t}`}});
  return r.json();
}

const calcIF = np => np ? np/FTP : 0;
const calcTSS = (sec,np) => { const IF=calcIF(np); return IF?(sec*np*IF)/(FTP*3600)*100:0; };
const calcVI = (np,avg) => avg&&np?np/avg:0;
const fmt = sec => { const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60); return h>0?`${h}h ${m.toString().padStart(2,'0')}m`:`${m} min`; };
const fmtDate = s => new Date(s).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'2-digit'});

function hrZone(hr) { const p=hr/HRMAX*100; if(p<60)return 0; if(p<72)return 1; if(p<82)return 2; if(p<90)return 3; if(p<95)return 4; return 5; }

function actType(act) {
  const np=act.weighted_average_watts||0, IF=calcIF(np), t=act.moving_time;
  if(!np) return {label:'Keine Power',color:'#9ca3af',bg:'#f3f4f6'};
  if(t<4500&&IF>0.85) return {label:'Intervalle',color:'#ea580c',bg:'#fff7ed'};
  if(t<3600&&IF<0.55) return {label:'Regeneration',color:'#16a34a',bg:'#f0fdf4'};
  if(IF>=0.75&&IF<0.85) return {label:'Sweetspot',color:'#d97706',bg:'#fffbeb'};
  if(IF>=0.85) return {label:'Schwelle',color:'#dc2626',bg:'#fef2f2'};
  return {label:'Grundlage',color:'#2563eb',bg:'#eff6ff'};
}

function analyze(act) {
  const np=act.weighted_average_watts||0, avg=act.average_watts||0;
  const IF=calcIF(np), TSS=calcTSS(act.moving_time,np), VI=calcVI(np,avg);
  const hr=act.average_heartrate||0, hrMax=act.max_heartrate||0;
  const dist=act.distance/1000, ins=[];

  if(np>0) {
    if(IF>0.95) ins.push({i:'⚡',t:`IF ${IF.toFixed(2)} — Schwellenarbeit nahe FTP. TSS ${Math.round(TSS)}, ${TSS>100?'2-3 Tage Erholung':'morgen leichter fahren'}.`});
    else if(IF>0.85) ins.push({i:'⚡',t:`IF ${IF.toFixed(2)} — Sweetspot. Optimaler FTP-Reiz. TSS ${Math.round(TSS)}.`});
    else if(IF>0.75) ins.push({i:'⚡',t:`IF ${IF.toFixed(2)} — Tempobereich. Guter aerober Entwicklungsreiz.`});
    else if(IF>0.60) ins.push({i:'⚡',t:`IF ${IF.toFixed(2)} — Grundlage Z2. Aerobe Basis wird gestärkt.`});
    else ins.push({i:'⚡',t:`IF ${IF.toFixed(2)} — Aktive Regeneration. Kaum metabolische Last.`});

    if(VI>1.15) ins.push({i:'📊',t:`VI ${VI.toFixed(3)} — Hohe Variabilität (Gelände/Intervalle). NP ${np}W ist die relevante Belastungsgröße.`});
    else if(VI>1.05) ins.push({i:'📊',t:`VI ${VI.toFixed(3)} — Moderate Variabilität, typisch für hügeliges Terrain.`});
    else ins.push({i:'📊',t:`VI ${VI.toFixed(3)} — Sehr gleichmäßige Pace ✓`});

    if(TSS>150) ins.push({i:'🔋',t:`TSS ${Math.round(TSS)} — Harte Einheit. 2-3 Tage vor der nächsten Intensität.`});
    else if(TSS>80) ins.push({i:'🔋',t:`TSS ${Math.round(TSS)} — Mittlere Belastung. 1-2 leichtere Tage empfohlen.`});
    else ins.push({i:'🔋',t:`TSS ${Math.round(TSS)} — Leichte Einheit. Kaum Erholung nötig.`});
  }

  if(hr>0&&np>0) {
    const ef=(avg/hr).toFixed(3);
    ins.push({i:'❤️',t:`Ø HR ${hr} bpm (${(hr/HRMAX*100).toFixed(0)}% HRmax, Z${hrZone(hr)+1}). Effizienz: ${ef} W/bpm.`});
    if(hr>155&&IF<0.70) ins.push({i:'🌡️',t:`HR hoch bei moderater Power — Vorermüdung, Hitze oder Dehydrierung möglich.`});
    if(hr<142&&IF>0.75) ins.push({i:'💚',t:`Niedrige HR bei guter Power — ausgezeichnete Tagesform.`});
  }

  if(dist>90) ins.push({i:'🏁',t:`${dist.toFixed(0)} km — lange Einheit. Kohlenhydrate und Protein nach der Fahrt nicht vergessen.`});

  if(act.average_cadence) {
    const c=Math.round(act.average_cadence);
    if(c<82) ins.push({i:'🦵',t:`Ø Kadenz ${c} rpm — etwas niedrig. Ziel: 88-96 rpm für bessere Effizienz.`});
    else ins.push({i:'✅',t:`Ø Kadenz ${c} rpm — gut.`});
  }
  return ins;
}

function lapDot(pw) {
  const p=pw/FTP*100;
  if(p>105) return '#ef4444'; if(p>88) return '#f97316';
  if(p>75) return '#facc15'; if(p>55) return '#60a5fa'; return '#4ade80';
}

function renderLaps(laps) {
  if(!laps||laps.length<=1) return '<div style="font-size:12px;color:var(--muted);padding:8px 0">Keine Lap-Daten.</div>';
  const rows = laps.map((l,i) => {
    const pw=l.average_watts||0, hr=l.average_heartrate||0;
    const np=l.normalized_power||0, cad=l.average_cadence?Math.round(l.average_cadence):0;
    const spd=l.average_speed?(l.average_speed*3.6).toFixed(1):'—';
    const dist=(l.distance/1000).toFixed(2);
    const t=fmt(l.elapsed_time);
    const pct=pw?Math.round(pw/FTP*100):0;
    const hrColor=hr?ZONE_COLORS[hrZone(hr)]:'var(--muted)';
    return `<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td>${t}</td><td>${dist}</td>
      <td><span class="dot" style="background:${lapDot(pw)}"></span><b>${pw||'—'}</b>${pct?` <span style="font-size:10px;color:var(--muted)">${pct}%</span>`:''}</td>
      <td>${np||'—'}</td>
      <td style="color:${hrColor}">${hr?Math.round(hr):'—'}</td>
      <td>${cad||'—'}</td><td>${spd}</td>
    </tr>`;
  });
  const ml=laps.filter(l=>l.average_watts>50);
  const ap=ml.length?Math.round(ml.reduce((s,l)=>s+(l.average_watts||0),0)/ml.length):0;
  const ah=ml.length?Math.round(ml.reduce((s,l)=>s+(l.average_heartrate||0),0)/ml.length):0;
  const ac=ml.length?Math.round(ml.reduce((s,l)=>s+(l.average_cadence||0),0)/ml.length):0;
  const as=ml.length?(ml.reduce((s,l)=>s+(l.average_speed||0),0)/ml.length*3.6).toFixed(1):'—';
  return `<div style="overflow-x:auto">
    <table class="laps-table">
      <thead><tr><th>#</th><th>Zeit</th><th>km</th><th>Ø W</th><th>NP</th><th>Ø HR</th><th>Kad</th><th>km/h</th></tr></thead>
      <tbody>${rows.join('')}
      ${ml.length>1?`<tr style="background:var(--surface2)">
        <td colspan="3" style="font-weight:700;font-size:10px;color:var(--muted)">Ø</td>
        <td><b>${ap}</b></td><td>—</td><td>${ah||'—'}</td><td>${ac||'—'}</td><td>${as}</td>
      </tr>`:''}
      </tbody>
    </table>
  </div>
  <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">
    ${[['<55%','#4ade80'],['55-75%','#60a5fa'],['75-88%','#facc15'],['88-105%','#f97316'],['>105%','#ef4444']].map(([l,c])=>
      `<span style="font-size:10px;color:var(--muted)"><span class="dot" style="background:${c}"></span>${l} FTP</span>`).join('')}
  </div>`;
}

function renderAct(act) {
  const np=act.weighted_average_watts||0, avg=act.average_watts||0;
  const IF=calcIF(np), TSS=calcTSS(act.moving_time,np);
  const type=actType(act), dist=(act.distance/1000).toFixed(1);
  const IFcolor=IF>0.95?'#dc2626':IF>0.85?'#ea580c':IF>0.75?'#d97706':'#2563eb';
  const hrColor=act.average_heartrate?ZONE_COLORS[hrZone(act.average_heartrate)]:'var(--muted)';
  const actJSON=JSON.stringify(act).replace(/"/g,'&quot;');

  return `<div class="activity-card" id="act-${act.id}">
    <div class="activity-header" onclick="toggleAct('${act.id}','${actJSON}')">
      <div>
        <div class="activity-name">${act.name}</div>
        <div class="activity-meta">
          <span>${fmtDate(act.start_date_local)}</span>
          <span>${dist} km</span>
          <span>${fmt(act.moving_time)}</span>
          ${act.total_elevation_gain?`<span>↑ ${Math.round(act.total_elevation_gain)} m</span>`:''}
        </div>
      </div>
      <div class="activity-badge" style="color:${type.color};background:${type.bg}">${type.label}</div>
    </div>
    <div class="activity-quick" onclick="toggleAct('${act.id}','${actJSON}')">
      <div class="quick-metric"><div class="quick-label">NP</div><div class="quick-value" style="color:${np?'var(--orange)':'var(--muted)'}">${np||'—'}<span style="font-size:10px;font-weight:400;color:var(--muted)"> W</span></div></div>
      <div class="quick-metric"><div class="quick-label">IF</div><div class="quick-value" style="color:${IFcolor}">${IF>0?IF.toFixed(2):'—'}</div></div>
      <div class="quick-metric"><div class="quick-label">TSS</div><div class="quick-value">${TSS>0?Math.round(TSS):'—'}</div></div>
      <div class="quick-metric"><div class="quick-label">Ø HR</div><div class="quick-value" style="color:${hrColor}">${act.average_heartrate?Math.round(act.average_heartrate):'—'}</div></div>
      <div class="quick-metric"><div class="quick-label">Kadenz</div><div class="quick-value">${act.average_cadence?Math.round(act.average_cadence):'—'}</div></div>
    </div>
    <div class="activity-body" id="body-${act.id}">
      <div id="bc-${act.id}"><div class="loading" style="padding:16px"><div class="spinner"></div></div></div>
    </div>
  </div>`;
}

const exp=new Set(), loaded={};

async function toggleAct(id, actStr) {
  const card=document.getElementById(`act-${id}`);
  if(exp.has(id)) { exp.delete(id); card.classList.remove('expanded'); return; }
  exp.add(id); card.classList.add('expanded');
  if(loaded[id]) return;
  loaded[id]=true;
  const act = JSON.parse(actStr.replace(/&quot;/g,'"'));

  const np=act.weighted_average_watts||0, avg=act.average_watts||0;
  const IF=calcIF(np), TSS=calcTSS(act.moving_time,np), VI=calcVI(np,avg);
  const ins=analyze(act);

  // Render analysis immediately without waiting for laps
  document.getElementById(`bc-${id}`).innerHTML = `
    <div class="metrics-grid">
      <div class="metric-box"><div class="metric-box-label">Ø Power</div><div class="metric-box-value">${avg||'—'}<span style="font-size:12px;color:var(--muted)"> W</span></div><div class="metric-box-sub">${avg?(avg/WEIGHT).toFixed(2)+' W/kg':''}</div></div>
      <div class="metric-box"><div class="metric-box-label">VI</div><div class="metric-box-value" style="color:${VI>1.1?'var(--yellow)':VI>1.05?'var(--muted)':'var(--green)'}">${VI>0?VI.toFixed(3):'—'}</div><div class="metric-box-sub">${VI>1.1?'variabel':VI>1.05?'moderat':'gleichmäßig'}</div></div>
      <div class="metric-box"><div class="metric-box-label">Max HR</div><div class="metric-box-value">${act.max_heartrate||'—'}<span style="font-size:12px;color:var(--muted)"> bpm</span></div><div class="metric-box-sub">${act.max_heartrate?(act.max_heartrate/HRMAX*100).toFixed(0)+'% HRmax':''}</div></div>
      <div class="metric-box"><div class="metric-box-label">Kalorien</div><div class="metric-box-value">${act.calories||'—'}</div><div class="metric-box-sub">kcal</div></div>
    </div>
    ${ins.length?`<div class="analysis-box"><h4>Coaching-Analyse</h4>${ins.map(i=>`<div class="insight-row"><span class="insight-icon">${i.i}</span><span style="font-size:12px;line-height:1.6">${i.t}</span></div>`).join('')}</div>`:''}
    <div id="laps-${id}"><div style="font-size:11px;color:var(--muted);padding:8px 0">Laps werden geladen...</div></div>
  `;
  // Load laps async
  try {
    const full = await Promise.race([
      api(`/activities/${id}`),
      new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),8000))
    ]);
    const laps = full.laps||[];
    const lapsEl = document.getElementById(`laps-${id}`);
    if(lapsEl) {
      if(laps.length>1) lapsEl.innerHTML=`<div class="analysis-box"><h4>Laps (${laps.length})</h4>${renderLaps(laps)}</div>`;
      else lapsEl.innerHTML='';
    }
  } catch(e) {
    const lapsEl = document.getElementById(`laps-${id}`);
    if(lapsEl) lapsEl.innerHTML='<div style="font-size:11px;color:var(--muted);padding:4px 0">Lap-Daten nicht verfügbar.</div>';
  }
}

// READINESS
function calcReadiness(hr,hrv) {
  if(!hr&&!hrv) return null;
  let s=50;
  if(hr) s-=(hr-HR_BASE)*5;
  if(hrv) s+=(hrv-HRV_BASE)*0.8;
  return Math.max(0,Math.min(100,s));
}

function readinessLabel(s) {
  if(s>=80) return {t:'Optimal — Intervalle oder lange Einheit',c:'#16a34a'};
  if(s>=65) return {t:'Gut — Grundlage oder moderate Intensität',c:'#2563eb'};
  if(s>=50) return {t:'Okay — Grundlage, kein Hochintensiv',c:'#d97706'};
  return {t:'Erholt noch — Z1 oder Ruhetag empfohlen',c:'#dc2626'};
}

function updateReadiness() {
  const hr=parseFloat(document.getElementById('m-hr')?.value)||null;
  const hrv=parseFloat(document.getElementById('m-hrv')?.value)||null;
  const w=parseFloat(document.getElementById('m-weight')?.value)||null;
  const sl=parseFloat(document.getElementById('m-sleep')?.value)||null;
  S.setJ('morning',{hr,hrv,w,sl});
  const score=calcReadiness(hr,hrv);
  if(score===null) return;
  let fs=score;
  if(sl) fs+=sl>=8?5:sl>=7?0:sl>=6?-10:-20;
  fs=Math.max(0,Math.min(100,fs));
  const lbl=readinessLabel(fs);
  const fill=document.getElementById('rf');
  const text=document.getElementById('rt');
  if(fill) { fill.style.width=fs+'%'; fill.style.background=lbl.c; }
  if(text) { text.textContent=`${Math.round(fs)}/100 — ${lbl.t}`; text.style.color=lbl.c; }
}

function morningHTML() {
  const sv=S.getJ('morning')||{};
  return `<div class="morning-card">
    <div class="morning-title">🌅 Tageswerte</div>
    <div class="morning-inputs">
      <div class="morning-field"><label>Ruhepuls</label><input type="number" id="m-hr" placeholder="${HR_BASE}" value="${sv.hr||''}" oninput="updateReadiness()"></div>
      <div class="morning-field"><label>HRV</label><input type="number" id="m-hrv" placeholder="${HRV_BASE}" value="${sv.hrv||''}" oninput="updateReadiness()"></div>
      <div class="morning-field"><label>Gewicht kg</label><input type="number" id="m-weight" placeholder="72" value="${sv.w||''}" step="0.1" oninput="updateReadiness()"></div>
      <div class="morning-field"><label>Schlaf h</label><input type="number" id="m-sleep" placeholder="7.5" value="${sv.sl||''}" step="0.5" oninput="updateReadiness()"></div>
    </div>
    <div class="readiness-bar">
      <div class="readiness-label">Tagesform</div>
      <div class="readiness-track"><div class="readiness-fill" id="rf"></div></div>
      <div class="readiness-text" id="rt">Werte eingeben...</div>
    </div>
  </div>`;
}

async function renderDashboard() {
  document.getElementById('app').innerHTML='<div class="loading"><div class="spinner"></div>Laden...</div>';
  try {
    const [athlete,activities]=await Promise.all([api('/athlete'),api('/athlete/activities?per_page=20')]);
    if(!Array.isArray(activities)) throw new Error('Keine Aktivitäten');
    const rides=activities.filter(a=>['Ride','VirtualRide','GravelRide'].includes(a.type)||['Ride','GravelRide'].includes(a.sport_type));

    document.getElementById('athlete-name').textContent=`${athlete.firstname} ${athlete.lastname} · FTP ${FTP}W · ${WEIGHT}kg`;
    document.getElementById('header-actions').innerHTML=`<button class="btn-small" onclick="renderDashboard()">↻</button><button class="btn-small" style="color:var(--red)" onclick="logout()">Abmelden</button>`;

    const now=new Date();
    const ws=new Date(now); ws.setDate(now.getDate()-now.getDay()+1); ws.setHours(0,0,0,0);
    const wr=rides.filter(a=>new Date(a.start_date)>=ws);
    const wTSS=wr.reduce((s,a)=>s+calcTSS(a.moving_time,a.weighted_average_watts||0),0);
    const wDist=wr.reduce((s,a)=>s+a.distance/1000,0);
    const ys=new Date(now.getFullYear(),0,1);
    const yDist=rides.filter(a=>new Date(a.start_date)>=ys).reduce((s,a)=>s+a.distance/1000,0);
    const l5TSS=rides.slice(0,5).reduce((s,a)=>s+calcTSS(a.moving_time,a.weighted_average_watts||0),0);

    document.getElementById('app').innerHTML=`
      ${morningHTML()}
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">TSS diese Woche</div><div class="stat-value" style="color:var(--orange)">${Math.round(wTSS)}</div><div class="stat-sub">${wr.length} Einheiten</div></div>
        <div class="stat-card"><div class="stat-label">km diese Woche</div><div class="stat-value">${Math.round(wDist)}</div><div class="stat-sub">seit Montag</div></div>
        <div class="stat-card"><div class="stat-label">km dieses Jahr</div><div class="stat-value">${Math.round(yDist)}</div><div class="stat-sub">${rides.filter(a=>new Date(a.start_date)>=ys).length} Fahrten</div></div>
        <div class="stat-card"><div class="stat-label">TSS letzte 5</div><div class="stat-value">${Math.round(l5TSS)}</div><div class="stat-sub">Ø ${Math.round(l5TSS/5)} pro Einheit</div></div>
      </div>
      <div class="section-header">
        <div class="section-title">Letzte Ausfahrten</div>
        <div style="font-size:11px;color:var(--muted)">Antippen für Analyse + Laps</div>
      </div>
      ${rides.map(renderAct).join('')}
    `;
    const sv=S.getJ('morning');
    if(sv?.hr||sv?.hrv) setTimeout(updateReadiness,100);
  } catch(e) {
    document.getElementById('app').innerHTML=`<div class="error-msg">${e.message}</div><button class="btn-small" onclick="logout()">Neu verbinden</button>`;
  }
}

function logout() { clearTokens(); window.history.replaceState({},'',window.location.pathname); init(); }

async function handleCallback(code) {
  document.getElementById('app').innerHTML='<div class="loading"><div class="spinner"></div>Verbinde...</div>';
  try {
    const r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:CLIENT_ID,client_secret:CLIENT_SECRET,code,grant_type:'authorization_code'})});
    const d=await r.json();
    if(d.access_token) { saveTokens(d.access_token,d.refresh_token,d.expires_at); window.history.replaceState({},'',window.location.pathname); await renderDashboard(); }
    else throw new Error(d.message||'Auth fehlgeschlagen');
  } catch(e) { document.getElementById('app').innerHTML=`<div class="error-msg">${e.message}</div>`; }
}

function init() {
  const code=new URLSearchParams(window.location.search).get('code');
  if(code) handleCallback(code);
  else if(S.get('sa')) renderDashboard();
  else {
    const url=`https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=activity:read_all`;
    document.getElementById('app').innerHTML=`<div class="connect-wrap"><a href="${url}" class="btn-primary" style="font-size:15px;padding:14px 28px"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>Mit Strava verbinden</a><p>Einmaliger Login · Nur Lesezugriff</p></div>`;
  }
}
init();
</script>
